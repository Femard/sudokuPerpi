<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Perpignan</title>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-sun icon-sun"></i>
                <h1>Sudoku <span class="accent">Perpignan</span></h1>
            </div>
            <p class="subtitle">Le jeu aux couleurs de la Fidelíssima Vila</p>
        </header>

        <main>
            <div class="game-controls">
                <button id="btn-new-game" class="btn primary"><i class="fa-solid fa-rotate-right"></i> Nouvelle Partie</button>
                <div class="difficulty-selector">
                    <select id="difficulty">
                        <option value="easy">Facile</option>
                        <option value="medium" selected>Moyen</option>
                        <option value="hard">Difficile</option>
                    </select>
                </div>
            </div>

            <div class="board-wrapper" id="capture-area">
                <div class="sudoku-board" id="board">
                    <!-- Grid generated by JS -->
                </div>
            </div>

            <div class="palette-container">
                <p class="palette-instruction">Sélectionnez une lettre puis cliquez sur une case :</p>
                <div class="letter-palette" id="palette">
                    <!-- Palette generated by JS -->
                </div>
                <div class="palette-actions">
                    <button id="btn-erase" class="btn outline erase-btn"><i class="fa-solid fa-eraser"></i> Effacer</button>
                    <button id="btn-hint" class="btn outline"><i class="fa-solid fa-lightbulb"></i> Indice</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="btn-check" class="btn success"><i class="fa-solid fa-check"></i> Vérifier</button>
                <button id="btn-export-png" class="btn secondary"><i class="fa-solid fa-image"></i> Exporter PNG</button>
                <button id="btn-export-pdf" class="btn secondary"><i class="fa-solid fa-file-pdf"></i> Exporter PDF</button>
                <button id="btn-export-batch" class="btn secondary"><i class="fa-solid fa-layer-group"></i> Exporter Lot (80)</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Sudoku Perpignan. Créé avec passion.</p>
        </footer>
    </div>

    <!-- Modals -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Félicitations ! 🎉</h2>
            <p>Vous avez résolu le Sudoku Perpignan !</p>
            <button id="btn-close-modal" class="btn primary">Fermer</button>
        </div>
    </div>

    <!-- Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- App Logic -->
    <script src="sudoku.js"></script>
    <script src="app.js"></script>
</body>
</html>
